name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generar carpeta android si no existe
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.galeria.app .
          fi

      - name: Aplicar AndroidManifest personalizado (permisos de almacenamiento)
        run: cp android_overrides/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Forzar compileSdk/targetSdk 35 y minSdk 24
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/' android/app/build.gradle
            sed -i 's/compileSdkVersion = flutter.compileSdkVersion/compileSdkVersion = 35/' android/app/build.gradle
            sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/' android/app/build.gradle
            sed -i 's/targetSdkVersion = flutter.targetSdkVersion/targetSdkVersion = 35/' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' android/app/build.gradle
            sed -i 's/minSdkVersion = flutter.minSdkVersion/minSdkVersion = 24/' android/app/build.gradle
          fi
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/' android/app/build.gradle.kts
            sed -i 's/compileSdk = flutter.compileSdk.get()/compileSdk = 35/' android/app/build.gradle.kts
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/' android/app/build.gradle.kts
            sed -i 's/targetSdk = flutter.targetSdk.get()/targetSdk = 35/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdk.get()/minSdk = 24/' android/app/build.gradle.kts
          fi
          echo "--- build.gradle(.kts) tras el parche ---"
          cat android/app/build.gradle 2>/dev/null || cat android/app/build.gradle.kts 2>/dev/null

      - name: Obtener dependencias
        run: flutter pub get

      - name: Parchear plugins viejos que usan jcenter() (ya no existe)
        run: |
          find "$HOME/.pub-cache" -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} \;
          find "$HOME/.pub-cache" -name "build.gradle.kts" -exec sed -i 's/jcenter()/mavenCentral()/g' {} \;
          echo "Archivos que aún mencionan jcenter (debería estar vacío):"
          grep -rl "jcenter()" "$HOME/.pub-cache" || true

      - name: Compilar APK release
        run: flutter build apk --release

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: galeria-apk
          path: build/app/outputs/flutter-apk/app-release.apk
